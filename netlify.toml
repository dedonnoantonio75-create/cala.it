[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# ── Clean URL redirects ──────────────────────────────────────────────────────

# IT root index
[[redirects]]
  from = "/it/"
  to = "/"
  status = 301

# EN home
[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

# FR home
[[redirects]]
  from = "/fr"
  to = "/fr/"
  status = 301

# ES home
[[redirects]]
  from = "/es"
  to = "/es/"
  status = 301

# DE home
[[redirects]]
  from = "/de"
  to = "/de/"
  status = 301

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# ── Cache static assets ──────────────────────────────────────────────────────
# CSS/JS: 1-hour cache with revalidation — fixed-name files (style.min.css) must
# be re-fetched after deploys; immutable would lock clients to stale content for a year.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Images/video: content rarely changes at a fixed URL — immutable + 1-year cache is safe.
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/video/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Sitemap / robots fresh ───────────────────────────────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
